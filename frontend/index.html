<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>餐厅智能分析系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f0ede8;color:#333;height:100vh;display:flex;flex-direction:column}
/* ── Header ── */
header{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;padding:14px 28px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 6px rgba(0,0,0,.18)}
header h1{font-size:1.25rem;font-weight:700}
header span{opacity:.75;font-size:.85rem;margin-left:auto}
/* ── Layout ── */
.layout{display:flex;flex:1;overflow:hidden}
/* ── Sidebar ── */
aside{width:240px;min-width:240px;background:#fff;border-right:1px solid #e0dbd5;display:flex;flex-direction:column;overflow:hidden}
aside h2{padding:14px 16px;font-size:.9rem;font-weight:700;color:#c0392b;border-bottom:1px solid #ece8e3}
#history-list{flex:1;overflow-y:auto;padding:8px}
.hist-item{padding:9px 10px;border-radius:6px;margin-bottom:4px;cursor:pointer;font-size:.8rem;border:1px solid transparent;transition:.15s}
.hist-item:hover{background:#fde8e8;border-color:#f5c6c6}
.hist-item .ts{color:#999;font-size:.72rem;display:block;margin-bottom:2px}
.hist-item .summary{color:#444;line-height:1.4}
.no-history{color:#aaa;font-size:.82rem;text-align:center;padding:20px 10px}
/* ── Main panel ── */
.main-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* ── Control bar ── */
.controls{padding:18px 24px;background:#fff;border-bottom:1px solid #e0dbd5;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.upload-zone{border:2px dashed #d0c8c0;border-radius:8px;padding:14px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:.2s;flex:1;min-width:220px;background:#fafaf8}
.upload-zone:hover,.upload-zone.drag-over{border-color:#c0392b;background:#fff5f5}
.upload-zone input{display:none}
.upload-zone .icon{font-size:1.4rem}
.upload-zone .hint{font-size:.85rem;color:#777}
.upload-zone .hint strong{color:#333;display:block;font-size:.9rem}
.file-chip{background:#fde8e8;border:1px solid #f5c6c6;border-radius:20px;padding:4px 12px;font-size:.8rem;color:#c0392b;display:flex;align-items:center;gap:6px}
.file-chip .rm{cursor:pointer;opacity:.6;font-size:1rem;line-height:1}
.file-chip .rm:hover{opacity:1}
button.primary{background:#c0392b;color:#fff;border:none;border-radius:6px;padding:10px 22px;font-size:.9rem;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
button.primary:hover{background:#a93226}
button.primary:disabled{background:#ccc;cursor:not-allowed}
/* ── Status bar ── */
.status-bar{padding:6px 24px;font-size:.8rem;color:#777;background:#fafaf8;border-bottom:1px solid #ece8e3;min-height:28px}
.status-bar.ok{color:#27ae60}
.status-bar.err{color:#c0392b}
/* ── Result area ── */
.result-area{flex:1;overflow:hidden;display:flex;flex-direction:column}
.result-tabs{display:flex;gap:0;border-bottom:1px solid #e0dbd5;background:#fff;padding:0 24px}
.tab-btn{padding:10px 18px;border:none;background:none;cursor:pointer;font-size:.88rem;color:#777;border-bottom:2px solid transparent;transition:.15s}
.tab-btn.active{color:#c0392b;border-bottom-color:#c0392b;font-weight:600}
.tab-content{flex:1;overflow:auto;display:none}
.tab-content.active{display:block}
/* Report iframe */
#tab-report{padding:0}
#report-frame{width:100%;height:100%;border:none;display:block}
/* Summary JSON */
#tab-summary{padding:24px}
#summary-box{background:#1e1e1e;color:#d4d4d4;border-radius:8px;padding:20px;font-family:monospace;font-size:.82rem;line-height:1.7;white-space:pre;overflow:auto;max-height:100%}
/* ── Loading overlay ── */
#loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:#fff;font-size:1rem}
#loading.show{display:flex}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <span>🍜</span>
  <h1>餐厅智能分析系统</h1>
  <span>Powered by Claude AI</span>
</header>

<div class="layout">

  <!-- 左侧：历史记录 -->
  <aside>
    <h2>📋 历史记录</h2>
    <div id="history-list"><p class="no-history">暂无记录</p></div>
  </aside>

  <!-- 右侧：主操作区 -->
  <div class="main-panel">

    <!-- 控制栏 -->
    <div class="controls">
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept=".csv">
        <span class="icon">📂</span>
        <div class="hint">
          <strong>上传菜单 CSV</strong>
          点击选择或拖拽文件至此
        </div>
      </div>
      <div id="file-chip" style="display:none" class="file-chip">
        <span id="file-name"></span>
        <span class="rm" id="remove-file">✕</span>
      </div>
      <button class="primary" id="analyze-btn">⚡ 一键分析</button>
    </div>

    <!-- 状态栏 -->
    <div class="status-bar" id="status-bar">就绪 · 选择菜单文件或直接使用内置示例数据</div>

    <!-- 结果标签页 -->
    <div class="result-area">
      <div class="result-tabs">
        <button class="tab-btn active" data-tab="report">📊 分析报告</button>
        <button class="tab-btn" data-tab="summary">🔢 摘要数据</button>
      </div>
      <div class="tab-content active" id="tab-report">
        <iframe id="report-frame" src="about:blank"></iframe>
      </div>
      <div class="tab-content" id="tab-summary">
        <div id="summary-box">// 点击「一键分析」后，摘要数据将显示在这里</div>
      </div>
    </div>

  </div>
</div>

<!-- Loading overlay -->
<div id="loading">
  <div class="spinner"></div>
  <span id="loading-msg">正在分析，请稍候…</span>
</div>

<script>
const API = '';  // same origin

// ── Upload ──────────────────────────────────────────────────────────────────
const zone      = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');
const fileChip  = document.getElementById('file-chip');
const fileName  = document.getElementById('file-name');
const removeBtn = document.getElementById('remove-file');
let uploadedFile = null;

zone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});
removeBtn.addEventListener('click', e => {
  e.stopPropagation(); uploadedFile = null;
  fileChip.style.display = 'none'; zone.style.display = 'flex';
  setStatus('已移除文件 · 将使用内置示例数据');
});

async function handleFile(f) {
  if (!f || !f.name.endsWith('.csv')) { setStatus('请选择 CSV 文件', 'err'); return; }
  setStatus(`正在上传 ${f.name}…`);
  const fd = new FormData(); fd.append('file', f);
  try {
    const r = await fetch(API + '/upload', { method: 'POST', body: fd });
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    uploadedFile = data.saved_as;
    fileName.textContent = f.name;
    fileChip.style.display = 'flex'; zone.style.display = 'none';
    setStatus(`✅ 上传成功：${f.name}（${(f.size/1024).toFixed(1)} KB）`, 'ok');
  } catch(e) { setStatus('上传失败：' + e.message, 'err'); }
}

// ── Analyze ──────────────────────────────────────────────────────────────────
document.getElementById('analyze-btn').addEventListener('click', async () => {
  showLoading(true, '正在运行全流程分析（Phase 1→4）…');
  setStatus('分析中…');
  try {
    const r = await fetch(API + '/analyze');
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    showLoading(false);

    // Show report in iframe
    document.getElementById('report-frame').src = API + '/report?t=' + Date.now();
    activateTab('report');

    // Show summary JSON
    document.getElementById('summary-box').textContent = JSON.stringify(data, null, 2);

    const top3 = (data.summary?.top3_themes || []).join(' / ') || '—';
    setStatus(`✅ 分析完成 · 耗时 ${data.elapsed_seconds}s · TOP3主题: ${top3}`, 'ok');
    loadHistory();
  } catch(e) {
    showLoading(false);
    setStatus('分析失败：' + e.message, 'err');
  }
});

// ── Tabs ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => activateTab(btn.dataset.tab));
});
function activateTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
}

// ── History ──────────────────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const r = await fetch(API + '/history?limit=20');
    const data = await r.json();
    const list = document.getElementById('history-list');
    if (!data.entries.length) {
      list.innerHTML = '<p class="no-history">暂无记录</p>';
      return;
    }
    list.innerHTML = data.entries.map(e => `
      <div class="hist-item">
        <span class="ts">${e.timestamp}</span>
        <div class="summary">${e.content.slice(0, 80)}${e.content.length > 80 ? '…' : ''}</div>
      </div>
    `).join('');
  } catch(_) {}
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function setStatus(msg, type) {
  const bar = document.getElementById('status-bar');
  bar.textContent = msg;
  bar.className = 'status-bar' + (type ? ' ' + type : '');
}
function showLoading(show, msg) {
  document.getElementById('loading').classList.toggle('show', show);
  document.getElementById('loading-msg').textContent = msg || '请稍候…';
  document.getElementById('analyze-btn').disabled = show;
}

// Init
loadHistory();
</script>
</body>
</html>
